# Test profile is intentionally near-empty.
# Testcontainers-based tests register the live container's JDBC URL/user/password via
# @DynamicPropertySource so this profile remains portable across CI runners.
# DataSource and jOOQ auto-configuration are excluded by default; integration tests
# that need them must re-enable explicitly or rely on @DynamicPropertySource setting a URL.
# See archive/openspec-legacy/changes/archive/2026-05-13-backend-scaffolding/design.md D7.
#
# Auth-related properties (app.auth.supabase.jwks-uri, app.auth.supabase.issuer) are likewise
# left blank — SecurityIntegrationTest injects them via @DynamicPropertySource at runtime from
# the JwksWireMockExtension. See archive/openspec-legacy/changes/archive/2026-06-08-backend-mvp-readonly/design.md D1.
spring:
  main:
    banner-mode: "off"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jooq.JooqAutoConfiguration

app:
  auth:
    supabase:
      jwks-uri:
      issuer:
      audience: authenticated
