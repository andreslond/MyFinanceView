# Test profile is intentionally near-empty.
# Testcontainers-based tests register the live container's JDBC URL/user/password via
# @DynamicPropertySource so this profile remains portable across CI runners.
# DataSource and jOOQ auto-configuration are excluded by default; integration tests
# that need them must re-enable explicitly or rely on @DynamicPropertySource setting a URL.
# See openspec/changes/backend-scaffolding/design.md D7.
spring:
  main:
    banner-mode: "off"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jooq.JooqAutoConfiguration
