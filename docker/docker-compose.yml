# Local Postgres for MyFinanceView development.
#
# Init pipeline (one-time, runs only when the data dir is empty — i.e. on
# `docker compose up -d` against a fresh volume):
#   1. ../database/local/V000__local_supabase_stubs.sql    ← local-only parity stubs
#
# Flyway runs at Spring Boot startup; V001+ are NO LONGER applied by the
# container. To bootstrap a clean database:
#   docker compose -f docker/docker-compose.yml down -v
#   docker compose -f docker/docker-compose.yml up -d
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
#
# Init scripts do NOT re-run on subsequent restarts of the same volume.
#
# See openspec/specs/database-migrations/ for the Flyway contract.

services:
  postgres:
    image: postgres:17
    container_name: myfinance-postgres-local
    environment:
      POSTGRES_DB: myfinance_local
      POSTGRES_USER: myfinance
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5433:5432"
    volumes:
      # Init orchestrator runs at /docker-entrypoint-initdb.d/00_init.sh
      - ../database/init-db.sh:/docker-entrypoint-initdb.d/00_init.sh:ro
      # V000 stubs (local-only Supabase parity) — read by the orchestrator
      - ../database/local:/var/lib/myfinance/local:ro
      - myfinance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myfinance -d myfinance_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  myfinance_pgdata:
