openapi: 3.1.0
info:
  title: MyFinanceView API
  version: 0.1.0-backend-mvp-readonly
  description: |
    REST API for MyFinanceView — personal finance backend.

    **Status:** MVP read-only surface (4 endpoints); feature `backend-mvp-readonly`
    tracked in `feature_list.json`. Adds GET transactions/accounts/categories and PATCH
    transactions/{id}/category. All endpoints require
    `Authorization: Bearer {Supabase JWT (ES256)}` unless explicitly marked
    public. Errors follow RFC 7807 (`application/problem+json`) and SHALL NOT
    echo tokens, claims, rejected UUIDs, transaction descriptions, or any
    schema internals.

    Future endpoints (transactions/{id}, /transactions/pending-review, /accounts/{id}/billing-summary,
    /merchants*, /feedback/transaction, /savings-goals*) are tracked as pending features
    in `feature_list.json`.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.myfinanceview.dev
    description: Production (planned — pending registration)

security:
  - bearerAuth: []

tags:
  - name: Transactions
    description: User-scoped transaction listing and category re-assignment
  - name: Accounts
    description: User-scoped account list
  - name: Categories
    description: System + user-custom categories
  - name: Operations
    description: Public health probe (no auth)

paths:
  /api/v1/transactions:
    get:
      tags: [Transactions]
      operationId: listTransactions
      summary: List transactions for the authenticated user, paginated
      description: |
        Returns `PageDTO<TransactionDTO>` ordered by `occurredAt DESC, id DESC`.
        Server-side filter `WHERE user_id = <JWT.sub>` is **always** applied;
        cross-user `accountId` / `categoryIds` filters return empty results
        (intersected with user_id), never an error.
      parameters:
        - name: accountId
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: Optional filter; if it belongs to another user the result set is empty.
        - name: categoryIds
          in: query
          required: false
          schema:
            type: array
            items: { type: string, format: uuid }
          style: form
          explode: false
          description: Comma-separated list of category UUIDs (system or custom-owned).
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        '200':
          description: Paginated list (may be empty)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageDTO_TransactionDTO' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/transactions/{id}/category:
    patch:
      tags: [Transactions]
      operationId: updateTransactionCategory
      summary: Re-assign a transaction's category (idempotent, triggers merchant feedback loop)
      description: |
        Re-assigns the transaction's category. Idempotent when
        `body.categoryId == current categoryId` — no DB write, no `updated_at`
        bump, no merchant mutation. Otherwise executes in a single Postgres
        transaction: (1) UPDATE `transactions.category_id` + `updated_at`,
        (2) feedback loop on `myfinance.merchants` per design D5 —
        re-confirmation increments confidence by `+0.10` capped at `1.00`;
        drift (new category != merchant's learned category) resets the merchant
        to `confidence=0.50, match_count=1, category_id=new`; first learning
        UPSERTs a new merchant with `confidence=0.50, match_count=1`.

        Visibility guard: if `categoryId` is not a system category and not
        owned by the user, responds 404 (anti-IDOR — no enumeration leak,
        no UUID echo).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCategoryRequest' }
      responses:
        '200':
          description: Updated TransactionDTO (or unchanged if idempotent)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionDTO' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/accounts:
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: List the authenticated user's accounts, sorted by name ASC
      description: |
        Returns `List<AccountDTO>` for the authenticated user, ordered by
        `name ASC`. **Mapping:** `AccountDTO.name` is served from the DB
        column `accounts.nickname` (rename happens in `AccountMapper`, not
        in schema — see design D6). No `name` column exists in `accounts`.
      responses:
        '200':
          description: Array of accounts (possibly empty)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AccountDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List system + user-custom categories, sorted by display_name ASC
      description: |
        Returns `List<CategoryDTO>` containing **all** system categories
        (`user_id IS NULL`) merged with the authenticated user's custom
        categories, ordered by `display_name ASC`. **Mapping:**
        `CategoryDTO.name` is served from `categories.display_name` (Spanish,
        NOT NULL post-V004). The MVP frontend's `parentId` field is **NOT**
        included — the schema has no `parent_id` column (design D6).
      responses:
        '200':
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CategoryDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /actuator/health:
    get:
      tags: [Operations]
      operationId: getHealth
      summary: Health probe (public)
      description: |
        Public liveness probe. Returns exactly `{"status": "UP"}` — no
        `components`, no `db`, no `details` (configured via
        `management.endpoint.health.show-details=never`,
        `show-components=never`) to avoid leaking DB connection state.

        All other `/actuator/**` paths (`info`, `env`, `configprops`,
        `heapdump`, `threaddump`, `beans`, `mappings`, `metrics`, …) are
        **disabled** and respond 404 to anyone (authenticated or not).
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status]
                properties:
                  status: { type: string, enum: [UP], example: UP }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Supabase-issued JWT, ES256 (P-256), validated against
        `https://akkoqdjmmozyqdfjkabg.supabase.co/auth/v1/.well-known/jwks.json`
        with `iss` = Supabase issuer URL, `aud` = `authenticated`, `sub` =
        valid UUID. Configured via env vars `SUPABASE_JWT_JWKS_URI` and
        `SUPABASE_JWT_ISSUER`.

  parameters: {}

  responses:
    BadRequest:
      description: Validation error. Body does NOT echo received values.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetailWithErrors' }
          examples:
            invalidPageSize:
              summary: pageSize out of range
              value:
                type: https://myfinanceview.local/errors/bad-request
                title: Bad Request
                status: 400
                detail: Validation failed
                instance: /api/v1/transactions
                errors:
                  - field: pageSize
                    message: must be between 1 and 100
    Unauthorized:
      description: Missing, malformed, expired, or invalid JWT. Body does NOT echo the token.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
          examples:
            unauthorized:
              value:
                type: https://myfinanceview.local/errors/unauthorized
                title: Unauthorized
                status: 401
                detail: Unauthorized
                instance: /api/v1/transactions
    Forbidden:
      description: |
        CORS preflight rejected (Origin not in allowlist). Body is empty,
        no `Access-Control-Allow-*` headers are emitted. Authenticated users
        do not hit 403 in normal flows — cross-user resource access is
        modeled as 404 (anti-enumeration).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
    NotFound:
      description: |
        Resource does not exist OR is not visible to the authenticated user
        (anti-IDOR — same response shape for "doesn't exist" and "belongs to
        another user"). Body does NOT echo the rejected UUID.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
          examples:
            notFound:
              value:
                type: https://myfinanceview.local/errors/not-found
                title: Resource not found
                status: 404
                detail: Resource not found
                instance: /api/v1/transactions/{id}/category
    InternalError:
      description: |
        Unexpected error. Body is generic — no stack trace, no exception
        name, no schema internals.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
          examples:
            internalError:
              value:
                type: https://myfinanceview.local/errors/internal
                title: Internal Server Error
                status: 500
                detail: An unexpected error occurred
                instance: /api/v1/transactions/{id}/category

  schemas:
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details with `type` prefix `https://myfinanceview.local/errors/`.
      additionalProperties: false
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
          example: https://myfinanceview.local/errors/not-found
        title: { type: string, example: Resource not found }
        status: { type: integer, example: 404 }
        detail: { type: string, example: Resource not found }
        instance: { type: string, example: /api/v1/transactions/{id}/category }

    ProblemDetailWithErrors:
      allOf:
        - $ref: '#/components/schemas/ProblemDetail'
        - type: object
          properties:
            errors:
              type: array
              description: Field-level validation errors. Field values are NOT echoed.
              items:
                type: object
                additionalProperties: false
                required: [field, message]
                properties:
                  field: { type: string, example: pageSize }
                  message: { type: string, example: must be between 1 and 100 }

    PageDTO_TransactionDTO:
      type: object
      additionalProperties: false
      required: [rows, page, pageSize, hasMore]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/TransactionDTO' }
        page: { type: integer, minimum: 1, example: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100, example: 25 }
        hasMore: { type: boolean, example: true }

    TransactionDTO:
      type: object
      additionalProperties: false
      required: [id, accountId, type, amount, currency, occurredAt, createdAt, updatedAt]
      description: |
        User-scoped transaction view. Excludes `raw_payload`, `notes`,
        `external_id`, `amount_base_currency`, and `source` (PII / internals);
        a future change with a dedicated threat model gates exposure.
      properties:
        id: { type: string, format: uuid }
        accountId: { type: string, format: uuid }
        categoryId:
          type: string
          format: uuid
          nullable: true
          description: Null when no category has been confirmed for the transaction yet.
        merchantId:
          type: string
          format: uuid
          nullable: true
          description: Populated post-V005 when the feedback loop has resolved a merchant.
        type:
          type: string
          enum:
            - credit_card_purchase
            - debit_purchase
            - credit_card_payment
            - incoming_transfer
            - outgoing_transfer
            - incoming_payment
        amount:
          type: string
          pattern: '^-?\d+\.\d{2}$'
          description: |
            BigDecimal serialized as JSON **string** via `toPlainString()`
            with scale 2. Never a JSON number — preserves precision and
            avoids `double`/`float` round-trips.
          example: "12345.67"
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: COP
        description:
          type: string
          nullable: true
          description: Bank-provided description; may be redacted in non-PII contexts.
        occurredAt:
          type: string
          format: date-time
          description: UTC `OffsetDateTime`. Clients convert to `America/Bogota` for display only.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AccountDTO:
      type: object
      additionalProperties: false
      required: [id, name, type, currency, active, createdAt, updatedAt]
      description: |
        User-scoped account. `name` is served from `accounts.nickname`
        (rename happens in mapper — see design D6). `last4` is null for
        non-card accounts.
      properties:
        id: { type: string, format: uuid }
        name:
          type: string
          description: Maps from `accounts.nickname`.
          example: Davivienda Signature
        last4:
          type: string
          minLength: 4
          maxLength: 4
          nullable: true
          example: "1234"
        type:
          type: string
          enum: [checking, savings, credit_card]
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: COP
        active: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CategoryDTO:
      type: object
      additionalProperties: false
      required: [id, name, type]
      description: |
        Category (system or user-custom). `name` is served from
        `categories.display_name` (Spanish, NOT NULL post-V004). The
        underlying English `categories.name` is the stable internal key
        and is **not** exposed. `parentId` is intentionally **omitted** —
        the schema has no `parent_id` column.
      properties:
        id: { type: string, format: uuid }
        name:
          type: string
          description: Maps from `categories.display_name` (Spanish label).
          example: Restaurantes y Cafés
        type:
          type: string
          enum: [expense, income]
        color:
          type: string
          nullable: true
          example: "#FF6B6B"
        icon:
          type: string
          nullable: true
          example: utensils

    UpdateCategoryRequest:
      type: object
      additionalProperties: false
      required: [categoryId]
      properties:
        categoryId:
          type: string
          format: uuid
          description: |
            Target category UUID. Must be visible to the authenticated user
            (system category with `user_id IS NULL` or custom category with
            `user_id = <JWT.sub>`). A non-visible UUID returns 404 without
            differentiation, and the rejected UUID is NOT echoed in the body.
